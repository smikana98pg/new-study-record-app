# ワークフローの名前（GitHub Actionsのタブに表示される）
name: Deploy to Firebase Hosting on merge

# いつこのワークフローを実行するか
on:
  push:
    branches:
      - main # mainブランチにpushされたときに実行

# 実行するジョブの定義
jobs:
  # ========== ジョブ1: ビルド ==========
  build:
    name: Build
    runs-on: ubuntu-latest # Ubuntu（Linux）の最新版の仮想マシンで実行
    steps:
      # リポジトリのコードをチェックアウト（ダウンロード）する
      - uses: actions/checkout@v4
      # Node.jsのバージョンを指定してセットアップ
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # 依存パッケージをpackage-lock.jsonに基づいてクリーンインストール
      - run: npm ci
      # ビルドを実行（dist フォルダが生成される）
      - run: npm run build
        # ビルド時に必要な環境変数をGitHub Secretsから注入
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ========== ジョブ2: テスト ==========
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build # buildジョブが成功したら実行（失敗したらスキップ）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      # Jestのテストを実行
      - run: npm run test

  # ========== ジョブ3: デプロイ ==========
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test # testジョブが成功したら実行（失敗したらスキップ）
    steps:
      - uses: actions/checkout@v4
      # デプロイ用にビルドし直す（各ジョブは別々の仮想マシンなので、buildジョブの成果物は残っていない）
      - run: npm ci && npm run build
        env:
          VITE_SUPABASE_URL: ${{  secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{  secrets.VITE_SUPABASE_ANON_KEY }}
      # Firebase Hostingにデプロイ
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          # GitHubが自動で発行するトークン（リポジトリへのアクセス権限）
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # firebase init hosting:github で自動作成されたサービスアカウントの認証情報
          firebaseServiceAccount: ${{  secrets.FIREBASE_SERVICE_ACCOUNT_NEW_STUDY_RECORD_APP_9F479 }}
          # live = 本番サイトにデプロイ（プレビューではなく）
          channelId: live
          # デプロイ先のFirebaseプロジェクトID
          projectId: new-study-record-app-9f479
