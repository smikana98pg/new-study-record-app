# このファイルはFirebase CLIによって自動生成されました
# https://github.com/firebase/firebase-tools

# ワークフローの名前（GitHub Actionsのタブに表示される）
name: Deploy to Firebase Hosting on PR

# プルリクエストが作成・更新されたときに実行
on: pull_request

# このワークフローに付与する権限
permissions:
  checks: write # チェック結果の書き込み権限
  contents: read # リポジトリの内容の読み取り権限
  pull-requests: write # PRへのコメント書き込み権限（プレビューURLをコメントするため）

# 実行するジョブの定義
jobs:
  # ========== ジョブ1: ビルド ==========
  build:
    name: Build
    # フォーク元のPRではなく、同じリポジトリからのPRのみ実行（セキュリティ対策）
    if: $ github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      # リポジトリのコードをチェックアウト（ダウンロード）する
      - uses: actions/checkout@v4
      # Node.jsのバージョンを指定してセットアップ
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # 依存パッケージをpackage-lock.jsonに基づいてクリーンインストール
      - run: npm ci
      # ビルドを実行（dist フォルダが生成される）
      - run: npm run build
        # ビルド時に必要な環境変数をGitHub Secretsから注入
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ========== ジョブ2: テスト ==========
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build # buildジョブが成功したら実行（失敗したらスキップ）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      # Jestのテストを実行
      - run: npm run test

  # ========== ジョブ3: プレビューデプロイ ==========
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: test # testジョブが成功したら実行（失敗したらスキップ）
    steps:
      - uses: actions/checkout@v4
      # デプロイ用にビルドし直す（各ジョブは別々の仮想マシンなので、buildジョブの成果物は残っていない）
      - run: npm ci && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # Firebase Hostingのプレビューチャネルにデプロイ（本番には影響しない）
      # PRのコメントにプレビューURLが自動で追加される
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          # GitHubが自動で発行するトークン（PRへのコメント書き込みなどに使用）
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # firebase init hosting:github で自動作成されたサービスアカウントの認証情報
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NEW_STUDY_RECORD_APP_9F479 }}
          # デプロイ先のFirebaseプロジェクトID
          projectId: new-study-record-app-9f479
          # channelId: live がないので、本番ではなくプレビュー用の一時URLにデプロイされる
